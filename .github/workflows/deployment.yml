name: Publish to npm

on:
  push:
    branches: ["master"]
  pull_request:
    branches: ["master"]

env:
  LATEST_TAG: latest

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: "https://registry.npmjs.org/"

      - uses: pnpm/action-setup@v4

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm run build

      - name: Semantic Release 🚀
        id: semantic
        uses: cycjimmy/semantic-release-action@v4
        with:
          semantic_version: 25
          branches: master
          extra_plugins: |
            @semantic-release/changelog@^6
            @semantic-release/commit-analyzer@^13
            @semantic-release/git@^10
            @semantic-release/github@^12
            @semantic-release/npm@^13
            @semantic-release/release-notes-generator@^14
            semantic-release-export-data@^1
        env:
          GH_TOKEN: ${{ secrets.OPENINC_SEMANTIC_RELEASE }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN_ORG_OPENINC }}
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN_ORG_OPENINC }}
